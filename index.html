<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Craft01art Channel</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9ec4, #ffc1e3, #ffe4f2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Floating background circles */
body::before, body::after {
    content: "";
    position: absolute;
    width: 200px;
    height: 200px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    animation: float 6s infinite ease-in-out;
}

body::after {
    top: 70%;
    left: 70%;
    width: 150px;
    height: 150px;
    animation-delay: 3s;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0px); }
}

.container {
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    width: 320px;
    z-index: 1;
}

.profile {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid white;
    margin-bottom: 15px;
}

h1 {
    margin: 10px 0;
    color: #fff;
}

p {
    color: #fff;
    font-size: 14px;
}

.subscribe-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background: linear-gradient(45deg, #ff4da6, #ff66cc);
    color: white;
    text-decoration: none;
    border-radius: 25px;
    font-weight: bold;
    transition: 0.3s;
}

.subscribe-btn:hover {
    transform: scale(1.08);
}

/* Glow effect */
.subscribe-btn:active {
    box-shadow: 0 0 15px #ff66cc;
}
</style>
</head>

<body>

<div class="container">

    <!-- Profile Image (with fallback) -->
    <img src="./channel.png" 
         alt="Channel Profile" 
         class="profile"
         onerror="this.src='https://via.placeholder.com/120?text=Craft01art'">

    <!-- Channel Name -->
    <h1>@Craft01art</h1>

    <!-- Description -->
    <p>
        Welcome to my creative world 🎨<br>
        I share amazing art, crafts, and creative ideas.<br>
        Subscribe and support the journey 💖
    </p>

    <!-- Subscribe Button -->
    <a href="https://youtube.com/@craft01art?si=2yk3PXzeU-dJoz04"
       target="_blank"
       class="subscribe-btn">
       Subscribe Now
    </a>

</div>

</body>
</html>
